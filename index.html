    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",

        "name": "Journey",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "iOS, Android",
        "description": "Journey is a location-aware storytelling platform and mobile audio tour guide. The app uses GPS location awareness to trigger local history audio stories and audio guides precisely when you arrive at a historically significant spot. As you walk through the city, Journey senses your exact location and begins playing a narrative episode — an audio guide composed from historical records and cultural archives.",

      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How Journey Audio Guides Work",
        "description": "Journey delivers location-aware storytelling through mobile audio tour guides that trigger local history audio stories based on your GPS position.",
        "step": [
          {
            "@type": "HowToStep",
            "name": "Open Journey and allow location access",
            "text": "Launch the Journey app and grant location permissions so the app can detect your precise GPS position."
          },
          {
            "@type": "HowToStep",
            "name": "Walk through the city with headphones",
            "text": "Explore the city on foot. Journey runs quietly in the background as your mobile tour guide."
          },
          {
            "@type": "HowToStep",
            "name": "Location awareness triggers your audio guide",
            "text": "Journey's location-aware storytelling engine detects when you arrive at a historically significant spot — down to the building level."
          },
          {
            "@type": "HowToStep",
            "name": "Listen to local history audio stories",
            "text": "An immersive audio guide begins, delivering local history audio stories composed from historical records and cultural archives for that exact location."
          }
        ]
      }
    ]
